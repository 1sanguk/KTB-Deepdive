services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - api_keys          # ANTHROPIC_API_KEY, LANGSMITH_API_KEY
    volumes:
      # 사용자 데이터 & 히스토리 영속화
      - ./source/data:/app/source/data
      # FAISS 캐시 영속화 (재빌드 방지)
      - ./source/.cache:/app/source/.cache
    restart: unless-stopped
